name: Release On Master

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        shell: bash
        run: |
          COMMIT_DATE="$(git show -s --format=%cs HEAD | tr '-' '.')"
          COMMIT_SHORT="$(git rev-parse --short HEAD)"
          RELEASE_VERSION="${COMMIT_DATE}-${COMMIT_SHORT}"

          echo "commit_date=${COMMIT_DATE}" >> "$GITHUB_OUTPUT"
          echo "commit_short=${COMMIT_SHORT}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create git tag if missing
        shell: bash
        run: |
          RELEASE_VERSION="${{ steps.version.outputs.release_version }}"

          if git rev-parse "${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_VERSION} already exists"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_VERSION}"
          git push origin "${RELEASE_VERSION}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_version }}
          name: ${{ steps.version.outputs.release_version }}
          generate_release_notes: false
          body: |
            Release automática gerada a partir de push no master.

            - Versão: `${{ steps.version.outputs.release_version }}`
            - Commit: `${{ github.sha }}`
